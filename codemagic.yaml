workflows:
  android-debug:
    name: Android Debug Build (Flutter)
    max_build_duration: 35
    environment:
      flutter: "3.27.3"     # або версія, яку ти використовуєш
      vars:
        CM_ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Build Android Debug APK
        script: |
          flutter build apk --debug --flavor staging   # змініть flavor якщо потрібно

    artifacts:
      - build/app/outputs/flutter-apk/app-staging-debug.apk

  flutter-ios-simulator:
    name: Flutter iOS Simulator Build
    max_build_duration: 40
    environment:
      flutter: "3.27.3"
      xcode: latest
      vars:
        FLUTTER_BUILD_MODE: debug
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Build Flutter iOS Simulator
        script: |
          flutter build ios --simulator --flavor staging --no-codesign

    artifacts:
      - build/ios/iphonesimulator/Runner.app
