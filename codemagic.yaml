workflows:
  android-debug:
    name: Android Debug Build (Flutter)
    max_build_duration: 40
    environment:
      flutter: "3.27.3"
      vars:
        CM_ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd $CM_BUILD_DIR          # ← Важливо!
          flutter pub get

      - name: Build Android Debug APK
        script: |
          cd $CM_BUILD_DIR
          flutter build apk --debug --flavor staging   # прибери --flavor staging, якщо не використовуєш flavors

    artifacts:
      - build/app/outputs/flutter-apk/app-staging-debug.apk   # зміни якщо немає flavor

  flutter-ios-simulator:
    name: Flutter iOS Simulator Build
    max_build_duration: 45
    environment:
      flutter: "3.27.3"
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd $CM_BUILD_DIR
          flutter pub get

      - name: Build Flutter iOS Simulator
        script: |
          cd $CM_BUILD_DIR
          flutter build ios --simulator --flavor staging --no-codesign

    artifacts:
      - build/ios/iphonesimulator/Runner.app
