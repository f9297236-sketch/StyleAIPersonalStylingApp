workflows:
  android-debug:
    name: Android Debug Build (Flutter)
    max_build_duration: 45
    environment:
      flutter: "3.27.3"
      vars:
        CM_ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd $CM_BUILD_DIR
          ls -la                     # debug: see where we are
          cd YourProjectFolder       # ←←← CHANGE THIS to your actual folder name
          flutter pub get

      - name: Build Android Debug APK
        script: |
          cd $CM_BUILD_DIR
          cd YourProjectFolder       # ←←← CHANGE THIS
          flutter build apk --debug

    artifacts:
      - main/build/app/outputs/flutter-apk/app-debug.apk   # adjust path

  flutter-ios-simulator:
    name: Flutter iOS Simulator Build
    max_build_duration: 50
    environment:
      flutter: "3.27.3"
      xcode: latest
    scripts:
      - name: Get Flutter dependencies
        script: |
          cd $CM_BUILD_DIR
          cd YourProjectFolder       # ←←← CHANGE THIS
          flutter pub get

      - name: Build Flutter iOS Simulator
        script: |
          cd $CM_BUILD_DIR
          cd YourProjectFolder       # ←←← CHANGE THIS
          flutter build ios --simulator --no-codesign

    artifacts:
      - main/build/ios/iphonesimulator/Runner.app
